name: attendance_tracker
description: An attendance system that allows users to punch in and out at specific office locations.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.9.0
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  # connectivity_plus: ^7.1.1
  # package_info_plus: ^8.1.0

  flutter_screenutil: ^5.9.3
  permission_handler: ^12.0.1
  flutter_native_splash: ^2.4.1
  talker: ^5.1.17
  dio: ^5.9.2
  uuid: ^4.5.3
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  geolocator: ^14.0.2
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  equatable: ^2.0.8
  firebase_storage: ^13.4.1
  firebase_analytics: ^12.4.1
  firebase_crashlytics: ^5.2.2
  firebase_messaging: ^16.2.2
  google_maps_flutter: ^2.17.0
  geocoding: ^4.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.2.0
  local_auth: ^3.0.1
  encrypt: ^5.0.3
  cached_network_image: ^3.4.1
  google_fonts: ^8.1.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.15.0

  # Dev tools
  flutter_launcher_icons: ^0.14.1
  change_app_package_name: ^1.5.0
  rename: ^3.1.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/calendar.png
  android: true
  ios: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/calendar.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/calendar.png"