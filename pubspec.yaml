name: attendance_tracker
description: An attendance system that allows users to punch in and out at specific office locations.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  google_sign_in: ^7.2.0

  # State & routing
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3

  # Location 
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # UI & utilities
  flutter_screenutil: ^5.9.3
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  talker: ^5.1.17
  permission_handler: ^12.0.1
  flutter_native_splash: ^2.4.1
  google_fonts: ^8.1.0
  url_launcher: ^6.3.2
  envied: ^1.3.5
  google_maps_flutter: ^2.17.0
  google_maps_flutter_android: ^2.19.8
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # envied
  envied_generator: ^1.3.5
  build_runner: ^2.15.0

  # dev tools
  flutter_launcher_icons: ^0.14.1
  change_app_package_name: ^1.5.0
  rename: ^3.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/map_background.jpg

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/ic_calendor_log.png
  android: true
  ios: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/ic_calendor_log.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/ic_calendor_log.png"
